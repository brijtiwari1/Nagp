apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nagp-api-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nagp-api

  minReplicas: 1
  maxReplicas: 8

  metrics:
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 50